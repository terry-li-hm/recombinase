repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Block client-specific references from ever landing in the repo.
  # Belt-and-braces against the "client" leak that slipped into v0.1.4-0.1.10
  # CHANGELOG entries and commit messages before the git-history rewrite.
  - repo: local
    hooks:
      - id: no-client-names
        name: forbid client-specific names (capco, hsbc, jiahao, pack-b)
        language: pygrep
        entry: (?i)\b(capco|hsbc|jiahao|pack\s*b)\b
        exclude: ^\.pre-commit-config\.yaml$|^\.git/
        types_or: [text]
